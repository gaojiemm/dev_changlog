name: Generate Changelog

on:
  workflow_dispatch:
    inputs:
      since:
        description: "Start date (YYYY-MM-DD, JST). Leave blank to auto-compute last 14 days."
        required: false
        default: ""
      until:
        description: "End date (YYYY-MM-DD, JST). Leave blank to use today."
        required: false
        default: ""
  schedule:
    # Every Sunday at 00:00 JST (= Sunday 15:00 UTC)
    - cron: "0 15 * * 0"

jobs:
  changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history required by git-cliff

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Compute JST date window (last 14 days incl. today)
        id: dates
        shell: bash
        run: |
          set -euo pipefail
          TZ=Asia/Tokyo
          export TZ

          INPUT_SINCE="${{ github.event.inputs.since || '' }}"
          INPUT_UNTIL="${{ github.event.inputs.until || '' }}"

          if [ -n "$INPUT_SINCE" ] && [ -n "$INPUT_UNTIL" ]; then
            SINCE="$INPUT_SINCE"
            UNTIL="$INPUT_UNTIL"
          else
            UNTIL=$(date +%Y-%m-%d)
            SINCE=$(date -d "13 days ago" +%Y-%m-%d)
          fi

          echo "since=$SINCE" >> $GITHUB_OUTPUT
          echo "until=$UNTIL" >> $GITHUB_OUTPUT
          echo "Changelog window: $SINCE â†’ $UNTIL (JST)"

      - name: Resolve commit range for git-cliff
        id: range
        shell: bash
        run: |
          set -euo pipefail

          SINCE_DATE="${{ steps.dates.outputs.since }} 00:00:00 +0900"
          UNTIL_DATE="${{ steps.dates.outputs.until }} 23:59:59 +0900"

          mapfile -t COMMITS < <(git rev-list \
            --reverse \
            --since="$SINCE_DATE" \
            --until="$UNTIL_DATE" \
            HEAD)

          if [ "${#COMMITS[@]}" -eq 0 ]; then
            echo "range=" >> "$GITHUB_OUTPUT"
            echo "No commits found between $SINCE_DATE and $UNTIL_DATE"
            exit 0
          fi

          FIRST_COMMIT="${COMMITS[0]}"
          LAST_INDEX=$((${#COMMITS[@]} - 1))
          LAST_COMMIT="${COMMITS[$LAST_INDEX]}"

          if PARENT_COMMIT=$(git rev-parse "${FIRST_COMMIT}^" 2>/dev/null); then
            RANGE="${PARENT_COMMIT}..${LAST_COMMIT}"
          else
            RANGE="$LAST_COMMIT"
          fi

          echo "range=$RANGE" >> "$GITHUB_OUTPUT"
          echo "Resolved changelog range: $RANGE"

      - name: Generate changelog with git-cliff
        run: |
          if [ -n "${{ steps.range.outputs.range }}" ]; then
            git-cliff "${{ steps.range.outputs.range }}" -o CHANGELOG.md
          else
            cat > CHANGELOG.md <<'EOF'
          # Changelog

          No changes were found in the requested date window.
          EOF
          fi

      - name: Show changelog
        run: cat CHANGELOG.md

      - name: Upload changelog artifact
        uses: actions/upload-artifact@v4
        with:
          name: changelog-${{ steps.dates.outputs.since }}_${{ steps.dates.outputs.until }}
          path: CHANGELOG.md
          retention-days: 90

name: Generate Changelog

on:
  workflow_dispatch:
    inputs:
      since:
        description: "Start date (YYYY-MM-DD, JST). Leave blank to auto-compute the last 7 days."
        required: false
        default: ""
      until:
        description: "End date (YYYY-MM-DD, JST). Leave blank to use today."
        required: false
        default: ""
      use_ai:
        description: "Use GitHub Models to create Japanese summaries (requires GITHUB_MODELS_TOKEN secret)."
        required: false
        default: "true"
      ai_model:
        description: "GitHub Models model ID, for example openai/gpt-5-mini"
        required: false
        default: "openai/gpt-5-mini"
  schedule:
    # Every Sunday at 00:00 JST (= Sunday 15:00 UTC)
    - cron: "0 15 * * 0"

jobs:
  changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Compute JST date window (last 7 days incl. today)
        id: dates
        shell: bash
        run: |
          set -euo pipefail
          TZ=Asia/Tokyo
          export TZ

          INPUT_SINCE="${{ github.event.inputs.since || '' }}"
          INPUT_UNTIL="${{ github.event.inputs.until || '' }}"

          if [ -n "$INPUT_SINCE" ] && [ -n "$INPUT_UNTIL" ]; then
            SINCE="$INPUT_SINCE"
            UNTIL="$INPUT_UNTIL"
          else
            UNTIL=$(date +%Y-%m-%d)
            SINCE=$(date -d "6 days ago" +%Y-%m-%d)
          fi

          echo "since=$SINCE" >> $GITHUB_OUTPUT
          echo "until=$UNTIL" >> $GITHUB_OUTPUT
          echo "GitHub Changelog summary window: $SINCE → $UNTIL (JST)"

      - name: Generate GitHub Changelog weekly summary
        env:
          GITHUB_MODELS_TOKEN: ${{ secrets.GITHUB_MODELS_TOKEN }}
        run: |
          set -euo pipefail

          USE_AI="${{ github.event.inputs.use_ai || 'true' }}"
          AI_MODEL="${{ github.event.inputs.ai_model || 'openai/gpt-5-mini' }}"

          AI_FLAGS=""
          if [ "$USE_AI" = "true" ]; then
            AI_FLAGS="--use-github-ai --ai-model $AI_MODEL"
          fi

          python3 scripts/generate_github_changelog.py \
            --since "${{ steps.dates.outputs.since }}" \
            --until "${{ steps.dates.outputs.until }}" \
            --language ja \
            $AI_FLAGS \
            --output CHANGELOG.md

      - name: Show changelog
        run: cat CHANGELOG.md

      - name: Upload changelog artifact
        uses: actions/upload-artifact@v4
        with:
          name: changelog-${{ steps.dates.outputs.since }}_${{ steps.dates.outputs.until }}
          path: CHANGELOG.md
          retention-days: 90

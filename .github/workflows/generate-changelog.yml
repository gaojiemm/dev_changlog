name: Generate Changelog

on:
  workflow_dispatch:
    inputs:
      since:
        description: "Start date (YYYY-MM-DD, JST). Leave blank to auto-compute the last 7 days."
        required: false
        default: ""
      until:
        description: "End date (YYYY-MM-DD, JST). Leave blank to use today."
        required: false
        default: ""
      use_ai:
        description: "Use AI to generate Japanese summary."
        required: false
        default: "true"
      ai_provider:
        description: "AI provider: github | copilot-cli | local"
        required: false
        default: "github"
      ai_model:
        description: "Model ID for github/local providers."
        required: false
        default: "openai/gpt-5-mini"
  schedule:
    # Every Sunday at 00:00 JST (= Sunday 15:00 UTC)
    - cron: "0 15 * * 0"

jobs:
  changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Compute JST date window (last 7 days incl. today)
        id: dates
        shell: bash
        run: |
          set -euo pipefail
          TZ=Asia/Tokyo
          export TZ

          INPUT_SINCE="${{ github.event.inputs.since || '' }}"
          INPUT_UNTIL="${{ github.event.inputs.until || '' }}"

          if [ -n "$INPUT_SINCE" ] && [ -n "$INPUT_UNTIL" ]; then
            SINCE="$INPUT_SINCE"
            UNTIL="$INPUT_UNTIL"
          else
            UNTIL=$(date +%Y-%m-%d)
            SINCE=$(date -d "6 days ago" +%Y-%m-%d)
          fi

          echo "since=$SINCE" >> $GITHUB_OUTPUT
          echo "until=$UNTIL" >> $GITHUB_OUTPUT
          echo "GitHub Changelog summary window: $SINCE → $UNTIL (JST)"

      - name: Generate GitHub Changelog weekly summary
        env:
          # GITHUB_MODELS_TOKEN を優先し、未設定の場合は COPILOT_GITHUB_TOKEN を代わりに使う
          GITHUB_MODELS_TOKEN: ${{ secrets.GITHUB_MODELS_TOKEN || secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          USE_AI="${{ github.event.inputs.use_ai || 'true' }}"
          AI_PROVIDER="${{ github.event.inputs.ai_provider || 'github' }}"
          AI_MODEL="${{ github.event.inputs.ai_model || 'openai/gpt-5-mini' }}"

          echo "use_ai=$USE_AI"
          echo "ai_provider=$AI_PROVIDER"
          echo "ai_model=$AI_MODEL"
          if [ -n "${GITHUB_MODELS_TOKEN:-}" ]; then
            echo "token_status=present"
          else
            echo "token_status=missing"
          fi

          if [ "$USE_AI" = "true" ] && [ "$AI_PROVIDER" = "github" ] && [ -z "${GITHUB_MODELS_TOKEN:-}" ]; then
            echo "ERROR: AI provider is github, but GITHUB_MODELS_TOKEN (or COPILOT_GITHUB_TOKEN fallback) is missing." >&2
            exit 1
          fi

          ARGS=(
            --since "${{ steps.dates.outputs.since }}"
            --until "${{ steps.dates.outputs.until }}"
            --language ja
            --prompt-template prompts/changelog_weekly_ja.md
            --output CHANGELOG.md
          )

          if [ "$USE_AI" = "true" ]; then
            ARGS+=(
              --use-github-ai
              --ai-provider "$AI_PROVIDER"
              --ai-model "$AI_MODEL"
            )
          fi

          python3 scripts/generate_github_changelog.py "${ARGS[@]}"

          if [ "$USE_AI" = "true" ] && grep -q "AI要約を生成できませんでした" CHANGELOG.md; then
            echo "ERROR: AI summarization failed and fallback content was generated." >&2
            echo "Hint: verify GITHUB_MODELS_TOKEN (or COPILOT_GITHUB_TOKEN fallback) and ensure token has models:read permission." >&2
            echo "Hint: verify model id is available for your account, e.g. openai/gpt-4.1-mini." >&2
            exit 1
          fi

      - name: Show changelog
        run: cat CHANGELOG.md

      - name: Upload changelog artifact
        uses: actions/upload-artifact@v4
        with:
          name: changelog-${{ steps.dates.outputs.since }}_${{ steps.dates.outputs.until }}
          path: CHANGELOG.md
          retention-days: 90

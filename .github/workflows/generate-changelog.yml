name: Changelog 週次生成

on:
  workflow_dispatch:
    inputs:
      since:
        description: "開始日です。形式は YYYY-MM-DD。未指定時は直近 7 日を自動計算します。"
        required: false
        default: ""
      until:
        description: "終了日です。形式は YYYY-MM-DD。未指定時は当日を使います。"
        required: false
        default: ""
      use_ai:
        description: "Copilot CLI を使って日本語要約を生成します。"
        required: false
        default: "true"
  schedule:
    # 毎週日曜 00:00 JST
    - cron: "0 15 * * 0"

jobs:
  changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v5

      - name: Python をセットアップ
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: 対象期間を計算
        id: dates
        shell: bash
        run: |
          set -euo pipefail
          TZ=Asia/Tokyo
          export TZ

          INPUT_SINCE="${{ github.event.inputs.since || '' }}"
          INPUT_UNTIL="${{ github.event.inputs.until || '' }}"

          if [ -n "$INPUT_SINCE" ] && [ -n "$INPUT_UNTIL" ]; then
            SINCE="$INPUT_SINCE"
            UNTIL="$INPUT_UNTIL"
          else
            UNTIL=$(date +%Y-%m-%d)
            SINCE=$(date -d "6 days ago" +%Y-%m-%d)
          fi

          echo "since=$SINCE" >> $GITHUB_OUTPUT
          echo "until=$UNTIL" >> $GITHUB_OUTPUT
          echo "対象期間: $SINCE ～ $UNTIL (JST)"

      - name: Copilot CLI をインストール
        if: ${{ github.event.inputs.use_ai != 'false' }}
        run: |
          npm install -g @github/copilot
          copilot --version

      - name: CHANGELOG を生成
        env:
          # Copilot CLI 認証トークン（Fine-grained PAT）
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          USE_AI="${{ github.event.inputs.use_ai || 'true' }}"

          echo "use_ai=$USE_AI"
          if [ "$USE_AI" = "true" ] && [ -z "${COPILOT_GITHUB_TOKEN:-}" ]; then
            echo "エラー: COPILOT_GITHUB_TOKEN が設定されていません。" >&2
            echo "Copilot Requests: Read 権限つきの Fine-grained PAT を設定してください。" >&2
            exit 1
          fi

          ARGS=(
            --since "${{ steps.dates.outputs.since }}"
            --until "${{ steps.dates.outputs.until }}"
            --prompt-template prompts/changelog_weekly_ja.md
            --correction-prompt-template prompts/changelog_weekly_ja_review.md
            --output CHANGELOG.md
          )

          if [ "$USE_AI" = "true" ]; then
            ARGS+=(
              --use-github-ai
              --copilot-cli-command "copilot --silent"
            )
          fi

          python3 scripts/generate_github_changelog.py "${ARGS[@]}"

          if [ "$USE_AI" = "true" ] && grep -q "AI要約を生成できませんでした" CHANGELOG.md; then
            echo "エラー: AI 要約に失敗し、フォールバック出力が生成されました。" >&2
            echo "COPILOT_GITHUB_TOKEN と Copilot Requests: Read 権限を確認してください。" >&2
            echo "Copilot CLI は npm install -g @github/copilot で導入できます。" >&2
            exit 1
          fi

      - name: 生成結果を検証
        run: |
          python3 scripts/verify_changelog.py \
            --since "${{ steps.dates.outputs.since }}" \
            --until "${{ steps.dates.outputs.until }}" | tee verify_result.txt

      - name: 検証結果をサマリーに出力
        run: |
          {
            echo "検証結果"
            echo
            echo '```text'
            cat verify_result.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: CHANGELOG を表示
        run: cat CHANGELOG.md

      - name: 成果物を保存
        uses: actions/upload-artifact@v5
        with:
          name: changelog-${{ steps.dates.outputs.since }}_${{ steps.dates.outputs.until }}
          path: |
            CHANGELOG.md
            verify_result.txt
          retention-days: 90

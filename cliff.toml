# cliff.toml — git-cliff configuration
# Docs: https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes are documented here, grouped by date window.\n
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] – {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}\
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}\
{% if commit.breaking %}[**BREAKING**] {% endif %}\
{{ commit.message | upper_first }} ([`{{ commit.id | truncate(length=7, end="") }}`]({{ commit.id }}))\
{% endfor %}
{% endfor %}\n
"""
footer = """
---
*Generated by [git-cliff](https://git-cliff.org)*
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false

commit_preprocessors = [
  # Strip issue/PR references from the end of commit messages
  { pattern = '\s+\(#\d+\)$', replace = "" },
]

commit_parsers = [
  { message = "^feat",              group = "Features" },
  { message = "^fix",               group = "Bug Fixes" },
  { message = "^doc",               group = "Documentation" },
  { message = "^perf",              group = "Performance" },
  { message = "^refactor",          group = "Refactoring" },
  { message = "^style",             group = "Styling" },
  { message = "^test",              group = "Testing" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore\\(deps\\)",   skip = true },
  { message = "^chore|^ci",         group = "Miscellaneous" },
  { body    = ".*security",         group = "Security" },
  { message = "^revert",            group = "Reverts" },
]

protect_breaking_commits = false
filter_commits = false

# Tag pattern – adjust to your project's tagging convention
tag_pattern          = "v[0-9]*"
skip_tags            = ""
ignore_tags          = ""

topo_order   = false
sort_commits = "oldest"
